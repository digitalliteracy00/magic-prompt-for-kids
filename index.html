function buildPrompt(topic, step, f, ethics) {
  if (!topic || !f.subject) return "";
  var p = [];
  if (step >= 2 && f.role) p.push("[역할] 너는 " + f.role + "야.");
  if (step >= 5) {
    p.push("[주제] " + f.subject);
    if (f.target) p.push("[대상] " + f.target);
    if (f.condition) p.push("[조건] " + f.condition + "으로");
    if (f.format) p.push("[형식] " + f.format);
  } else if (step === 4) {
    p.push("[주제] " + f.subject);
    if (f.target) p.push("[대상] " + f.target);
    p.push("[조건] " + (f.condition || "") + "으로 알려줘.");
  } else if (step === 3) {
    p.push("[주제] " + f.subject);
    p.push("[대상] " + (f.target || "") + " 알려줘.");
  } else {
    p.push("[주제] " + f.subject);
  }
  if (step === 6 && ethics.length > 0)
    ETHICS.filter(e => ethics.includes(e.key)).forEach(e => p.push(e.phrase));
  return p.join(" ");
}

        </div>
        <div style={{ height:7, background:"#22253a", borderRadius:99, overflow:"hidden" }}>
          <div style={{ height:"100%", width:pct+"%", background:"linear-gradient(90deg,#1a6b2a,"+color+")", borderRadius:99, transition:"width .4s" }} />
        </div>
      </div>

      <div style={{ maxWidth:540, margin:"0 auto", padding:"16px 14px 40px" }}>
        {done ? (
          <div>
            <div style={{ background:"#0d2b1e", border:"2px solid #00c897", borderRadius:14, padding:24, textAlign:"center", marginBottom:14 }}>
              <div style={{ fontSize:38, marginBottom:8 }}>🎉</div>
              <div style={{ fontWeight:800, fontSize:20, color:"#00c897" }}>프롬프트 마스터 완성!</div>
              <div style={{ fontSize:15, color:"#aaa", marginTop:6 }}>6단계를 모두 완성했어요. 정말 훌륭해요!</div>
            </div>
            <div style={S.card}>
              <div style={{ color:"#aaa", fontWeight:700, fontSize:15, marginBottom:8 }}>📝 최종 완성 프롬프트</div>
              <div style={{ background:"#22253a", borderRadius:8, padding:"10px 14px", fontSize:15, color:"#c8d0e8", lineHeight:1.8, fontStyle:"italic" }}>{prompt}</div>
            </div>
            <AIResult topic={topic} step={6} color={color} />
            <button onClick={() => setScreen("topic")} style={S.btn("#5b3fa8")}>🔄 다른 주제로 도전하기</button>
          </div>
        ) : (
          <div>
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
              <div style={{ width:38, height:38, borderRadius:"50%", background:color, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:18, color:"#0f1117", flexShrink:0 }}>{step}</div>
              <div style={{ fontWeight:800, fontSize:19 }}>{sm.title}</div>
            </div>
            <div style={S.card}>
              <div style={{ color, fontWeight:700, fontSize:15, marginBottom:6 }}>📌 학습 목표</div>
              <div style={{ color:"#c8d0e8", fontSize:15, lineHeight:1.8 }}>{sm.goal}</div>
              <div style={{ background:"#0f1117", borderRadius:10, padding:"14px 16px", marginTop:10 }}>
                <div style={{ color, fontWeight:700, fontSize:14, marginBottom:8 }}>💡 {sm.gt}</div>
                {sm.gi.map((g,i) => <div key={i} style={{ color:"#aaa", fontSize:14, lineHeight:1.8 }}>✓ {g}</div>)}
                <div style={{ background:"#22253a", borderRadius:8, padding:"10px 14px", marginTop:10, fontSize:14, color:"#c8d0e8", lineHeight:1.8, fontStyle:"italic" }}>
                  <span style={{ color:"#666", fontSize:13 }}>프롬프트 예시:<br/></span>{ex}
                </div>
              </div>
              {step < 5 && (
                <div style={{ marginTop:14 }}>
                  <div style={{ color, fontWeight:700, fontSize:15, marginBottom:8 }}>🎯 직접 입력해봐요:</div>
                  <input value={getVal()} onChange={e => setVal(e.target.value)} placeholder={"예) "+ph} maxLength={80} style={S.input} />
                  {step === 2 && meta && (
                    <div style={{ marginTop:8, display:"flex", flexWrap:"wrap", gap:6 }}>
                      {meta.roleOptions.map(r => (
                        <button key={r} onClick={() => setField("role", r)}
                          style={{ background:"#22253a", border:"1px solid "+color+"55", color, borderRadius:20, padding:"5px 14px", fontSize:13, cursor:"pointer" }}>{r}</button>
                      ))}
                    </div>
                  )}
                  <div style={{ fontSize:13, color:"#555", marginTop:6 }}>💬 직접 입력하거나 예시를 참고해봐요!</div>
                </div>
              )}
              {step === 5 && (
                <div style={{ marginTop:14 }}>
                  <div style={{ color, fontWeight:700, fontSize:15, marginBottom:10 }}>🎯 형식을 선택하세요:</div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
                    {FORMAT_OPTIONS.map(opt => {
                      var sel = selFmt === opt.value;
                      return (
                        <button key={opt.value} onClick={() => pickFmt(opt.value)}
                          style={{ background:sel?color+"33":"#0f1117", border:"1.5px solid "+(sel?color:"#2a2d3a"), borderRadius:10, padding:"12px 10px", cursor:"pointer", color:sel?color:"#aaa", fontSize:14, fontWeight:sel?700:400, textAlign:"center" }}>
                          {opt.label}
                        </button>
                      );
                    })}
                  </div>
                  {selFmt === "__custom__" && (
                    <input value={customFmt} onChange={e => { setCustomFmt(e.target.value); setField("format", e.target.value); }}
                      placeholder="예) 편지 형식으로 써줘." maxLength={60} style={S.input} />
                  )}
                  {selFmt && selFmt !== "__custom__" && (
                    <div style={{ background:"#0f1117", borderRadius:8, padding:"8px 12px", fontSize:13, color:"#aaa", marginTop:4 }}>
                      선택된 형식: <span style={{ color }}>{selFmt}</span>
                    </div>
                  )}
                </div>
              )}
              {step === 6 && (
                <div style={{ marginTop:14 }}>
                  <div style={{ color:"#aaa", fontWeight:700, fontSize:15, marginBottom:10 }}>✏️ 원칙을 선택하세요 (1개 이상):</div>
                  {ETHICS.map(e => {
                    var ck = ethics.includes(e.key);
                    return (
                      <label key={e.key} style={{ display:"flex", alignItems:"flex-start", gap:10, background:ck?e.color+"22":"#0f1117", border:"1.5px solid "+(ck?e.color:"#2a2d3a"), borderRadius:10, padding:"10px 12px", cursor:"pointer", marginBottom:8 }}>
                        <input type="checkbox" checked={ck} onChange={() => setEthics(p => ck ? p.filter(x=>x!==e.key) : [...p,e.key])} style={{ marginTop:2, accentColor:e.color, width:16, height:16 }} />
                        <div>
                          <div style={{ fontWeight:700, color:e.color, fontSize:15 }}>{e.full}</div>
                          <div style={{ fontSize:14, color:"#888", marginTop:2 }}>"{e.phrase}"</div>
                        </div>
                      </label>
                    );
                  })}
                </div>
              )}
            </div>
            <div style={{ marginBottom:14 }}>
              <div style={{ color, fontWeight:700, fontSize:14, marginBottom:6 }}>📋 현재까지 만든 프롬프트:</div>
              <div style={{ background:"#0f1117", border:"1px solid #2a2d3a", borderRadius:10, padding:"12px 14px", fontSize:15, color:"#c8d0e8", lineHeight:1.9, minHeight:48 }}>
                {prompt || <span style={{ color:"#444" }}>아직 입력 내용이 없어요</span>}
              </div>
            </div>
            {!showHint && sm.hint && <button onClick={() => setShowHint(true)} style={{ width:"100%", marginBottom:10, padding:10, borderRadius:8, background:"none", border:"1px dashed #444", cursor:"pointer", color:"#888", fontSize:15 }}>💡 힌트 보기</button>}
            {showHint && sm.hint && <div style={{ background:"#1a1700", border:"1px solid #f0c060", borderRadius:10, padding:"10px 14px", marginBottom:10, fontSize:14, color:"#c8a040" }}><b>💡 힌트:</b> {sm.hint}</div>}
            <button onClick={() => setShowed(true)} disabled={!canShow} style={S.btn(color, !canShow)}>
              🤖 AI 결과 확인하기
            </button>
            {showed && (
              <div>
                <AIResult topic={topic} step={step} color={color} />
                <EvalCard g={guide} step={step} color={color} />
                <div style={{ background:"#0d2b1e", border:"1px solid #00c897", borderRadius:10, padding:"10px 14px", marginBottom:10, fontSize:15, color:"#00c897" }}>
                  {step < 6 ? "✅ 좋아요! 다음 단계에서 프롬프트를 더 발전시켜봐요!" : "⭐ 훌륭해요! 윤리 원칙까지 완성했어요!"}
                </div>
                <button onClick={goNext} style={S.btn(step<6?"#1a6b2a":"#5b3fa8")}>
                  {step < 6 ? "➡️ "+(step+1)+"단계로 가기!" : "🎉 최종 결과물 완성!"}
                </button>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
