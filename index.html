function getPrompt(){
  var m=TOPIC_META[st.topic];if(!m)return"";
  var s=st.subject;if(!s)return"";
  var p=[];
  if(st.step>=2&&st.role)p.push("[역할] 너는 "+st.role+"야.");
  if(st.step>=5){
    p.push("[주제] "+s);
    if(st.target)p.push("[대상] "+st.target);
    if(st.condition)p.push("[조건] "+st.condition+"으로");
    if(st.format)p.push("[형식] "+st.format);
  }else if(st.step===4){
    p.push("[주제] "+s);
    if(st.target)p.push("[대상] "+st.target);
    p.push("[조건] "+(st.condition||"")+"으로 알려줘.");
  }else if(st.step===3){
    p.push("[주제] "+s);
    p.push("[대상] "+(st.target||"")+" 알려줘.");
  }else{
    p.push("[주제] "+s);
  }
  if(st.step===6&&st.ethicsChecked.length>0)

}

function parseCards(txt){
  var m=[...txt.matchAll(/\[카드(\d)\]\s*([^\n]+)\n([\s\S]*?)(?=\[카드\d\]|$)/g)];
  if(m.length>=2)return m.map(function(x){return{num:x[1],title:x[2].trim(),body:x[3].trim()};});
  return null;
}

  if(st.loading)return;
  var p=getPrompt();
  if(!p.trim())return;
  if(st.step===6&&st.ethicsChecked.length===0)return;
  st.loading=true;st.aiResult="";st.called=false;draw();
  try{
    var r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:getSys(),messages:[{role:"user",content:p}]})
    });
    var d=await r.json();
    st.aiResult=d&&d.content?d.content.map(function(b){return b.text||"";}).join(""):"결과를 불러오지 못했어요.";
    st.called=true;
  }catch(e){st.aiResult="AI 연결에 실패했어요.";st.called=true;}
  st.loading=false;draw();
}

          '<div style="font-size:14px;font-weight:700;color:#e8eaf0;margin-bottom:6px">'+x.title+'</div>'+
          '<div style="font-size:13px;color:#aaa;line-height:1.7;white-space:pre-line">'+x.body+'</div></div>';}).join("")+'</div>';
    }else{inner='<div style="font-size:14px;color:#c8d0e8;line-height:1.9;white-space:pre-wrap;background:#0f1117;border-radius:10px;padding:10px 12px">'+st.aiResult+'</div>';}
  }
  return'<div style="background:#16181f;border:2px solid '+c+';border-radius:14px;padding:16px;margin-bottom:14px">'+
    '<div style="color:'+c+';font-weight:700;font-size:15px;margin-bottom:10px">🤖 AI 결과물 | '+lb[st.step-1]+' 단계 결과</div>'+inner+'</div>';
}

function draw(){
  var app=document.getElementById("app");
  var m=st.topic?TOPIC_META[st.topic]:null;
  var c=m?m.color:"#00c897";
  var sm=STEPS[st.step-1];
  var g=st.topic?GUIDE[st.topic][st.step-1]:null;
  var pr=getPrompt();
  var ti=TOPICS.find(function(t){return t.id===st.topic;});
  var pct=Math.round(st.step/6*100);
  var ex=st.topic?STEP_EX[st.topic][st.step-1]:"";

  if(st.screen==="topic"){
    app.innerHTML='<div style="background:#16181f;border-bottom:1px solid #2a2d3a;padding:20px 18px;text-align:center">'+
      '<div style="font-size:12px;color:#666;letter-spacing:1px;margin-bottom:4px">🏫 교육용 프로그램 · 초등학교 6학년</div>'+
      '<div style="font-size:24px;font-weight:800;color:#e8eaf0">✨ 마법의 AI 주문서</div>'+
      '<div style="font-size:14px;color:#888;margin-top:4px">AI 프롬프트를 단계별로 배워봐요</div></div>'+
      '<div class="wrap">'+
        '<div class="card" style="background:#1a1700;border-color:#f0c060">'+
          '<div style="color:#f0c060;font-weight:700;font-size:15px;margin-bottom:6px">🎯 오늘의 목표</div>'+
          '<div style="color:#d0c080;font-size:15px;line-height:1.8">주제를 선택하고 6단계를 완성하면<br>나만의 <b style="color:#f0c060">결과물</b>이 완성돼요!<br><span style="font-size:13px;color:#888">프롬프트 5요소 + 윤리 5원칙(사존보안공) 학습</span></div></div>'+
        '<div style="font-size:15px;color:#aaa;margin-bottom:12px;font-weight:600">📌 주문서 주제를 선택하세요</div>'+
        TOPICS.map(function(t){return'<button class="topic-btn" style="background:'+t.bg+';border-color:'+t.color+'" onclick="pick(\''+t.id+'\')">'+
          '<span style="font-size:40px">'+t.label.split(" ")[0]+'</span>'+
          '<div><div style="font-weight:800;font-size:18px;color:'+t.color+';margin-bottom:4px">'+t.label.replace(/^[^\s]+\s/,"")+'</div>'+
          '<div style="font-size:14px;color:#aaa">'+t.desc+'</div></div>'+
          '<span style="margin-left:auto;color:'+t.color+';font-size:22px">→</span></button>';}).join("")+
        '<div style="margin-top:20px;background:#16181f;border-radius:10px;padding:10px 14px;font-size:13px;color:#555;line-height:1.7;border:1px solid #2a2d3a">🔒 교육용 프로그램 · 개인정보 미수집 · 안전한 AI 응답만 제공</div>'+
      '</div>';
    return;
  }

  // 입력 섹션
  var inp="";
  if(st.step<5){
    var val=st.step===1?st.subject:st.step===2?st.role:st.step===3?st.target:st.condition;
    var ph="예) "+(m?m.keyword:"");
    var chips=st.step===2&&m?'<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px">'+m.roleOptions.map(function(r){return'<button class="chip" style="border-color:'+c+'55;color:'+c+'" onclick="setRole(\''+r+'\')">'+r+'</button>';}).join("")+'</div>':"";
    inp='<div style="margin-top:14px"><div style="color:'+c+';font-weight:700;font-size:15px;margin-bottom:8px">🎯 직접 입력해봐요:</div>'+
      '<input class="field" id="fi" style="border-color:'+c+'" value="'+val.replace(/"/g,'&quot;')+'" placeholder="'+ph+'" maxlength="80" oninput="onInp(this.value)">'+chips+
      '<div style="font-size:13px;color:#555;margin-top:6px">💬 직접 입력하거나 예시를 참고해봐요!</div></div>';
  }else if(st.step===5){
    var fb=FORMAT_OPTIONS.map(function(o){var sel=st.selFmt===o.value;return'<button class="fmt-btn" style="background:'+(sel?c+"33":"#0f1117")+';border-color:'+(sel?c:"#2a2d3a")+';color:'+(sel?c:"#aaa")+';font-weight:'+(sel?700:400)+'" onclick="selFmt(\''+o.value.replace(/\\/g,"\\\\").replace(/'/g,"\\'")+'\')">'+o.label+'</button>';}).join("");
    var ci=st.selFmt==="__custom__"?'<input class="field" style="border-color:'+c+'" value="'+st.customFmt.replace(/"/g,'&quot;')+'" placeholder="예) 편지 형식으로 써줘." maxlength="60" oninput="onCust(this.value)">':'';
    var si=st.selFmt&&st.selFmt!=="__custom__"?'<div style="background:#0f1117;border-radius:8px;padding:8px 12px;font-size:13px;color:#aaa;margin-top:4px">선택된 형식: <span style="color:'+c+'">'+st.selFmt+'</span></div>':"";
    inp='<div style="margin-top:14px"><div style="color:'+c+';font-weight:700;font-size:15px;margin-bottom:10px">🎯 형식을 선택하세요:</div>'+
      '<div class="fmt-grid">'+fb+'</div>'+ci+si+'</div>';
  }else if(st.step===6){
    inp='<div style="margin-top:14px"><div style="color:#aaa;font-weight:700;font-size:15px;margin-bottom:10px">✏️ 원칙을 선택하세요 (1개 이상):</div>'+
      ETHICS.map(function(e){var ck=st.ethicsChecked.includes(e.key);return'<div class="ethic-row" style="background:'+(ck?e.color+"22":"#0f1117")+';border-color:'+(ck?e.color:"#2a2d3a")+'" onclick="togE(\''+e.key+'\')">'+
        '<input type="checkbox" '+(ck?"checked":"")+' style="margin-top:2px;accent-color:'+e.color+';width:16px;height:16px;pointer-events:none">'+
        '<div><div style="font-weight:700;color:'+e.color+';font-size:15px">'+e.full+'</div>'+
        '<div style="font-size:14px;color:#888;margin-top:2px">"'+e.phrase+'"</div></div></div>';}).join("")+'</div>';
  }

  var dis=st.loading||(st.step===6&&st.ethicsChecked.length===0)||!pr.trim();
  var hint=sm.hint?(st.showHint?'<div style="background:#1a1700;border:1px solid #f0c060;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:14px;color:#c8a040"><b>💡 힌트:</b> '+sm.hint+'</div>':
    '<button class="hint-btn" onclick="st.showHint=true;draw()">💡 힌트 보기</button>'):"";
  var nxt=st.called&&!st.loading?'<div style="background:#0d2b1e;border:1px solid #00c897;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:15px;color:#00c897">'+
    (st.step<6?"✅ 좋아요! 다음 단계에서 프롬프트를 더 발전시켜봐요!":"⭐ 훌륭해요! 윤리 원칙까지 완성했어요!")+'</div>'+
    '<button class="btn" style="background:'+(st.step<6?"#1a6b2a":"#5b3fa8")+'" onclick="next()">'+(st.step<6?"➡️ "+(st.step+1)+"단계로 가기!":"🎉 최종 결과물 완성!")+'</button>':"";

  var main=st.done?
    '<div style="background:#0d2b1e;border:2px solid #00c897;border-radius:14px;padding:24px;text-align:center;margin-bottom:14px">'+
      '<div style="font-size:38px;margin-bottom:8px">🎉</div>'+
      '<div style="font-weight:800;font-size:20px;color:#00c897">프롬프트 마스터 완성!</div>'+
      '<div style="font-size:15px;color:#aaa;margin-top:6px">6단계를 모두 완성했어요!</div></div>'+
    '<div class="card"><div style="color:#aaa;font-weight:700;font-size:15px;margin-bottom:8px">📝 최종 완성 프롬프트</div>'+
      '<div style="background:#22253a;border-radius:8px;padding:10px 14px;font-size:15px;color:#c8d0e8;line-height:1.8;font-style:italic">'+pr+'</div></div>'+
    (st.aiResult?aiBox(c):"")+
    '<button class="btn" style="background:#5b3fa8" onclick="st.screen=\'topic\';draw()">🔄 다른 주제로 도전하기</button>'
  :
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'+
      '<div class="step-num" style="background:'+c+'">'+st.step+'</div>'+
      '<div style="font-weight:800;font-size:19px;color:#e8eaf0">'+sm.title+'</div></div>'+
    '<div class="card">'+
      '<div style="color:'+c+';font-weight:700;font-size:15px;margin-bottom:6px">📌 학습 목표</div>'+
      '<div style="color:#c8d0e8;font-size:15px;line-height:1.8">'+sm.goal+'</div>'+
      '<div class="guide-box"><div style="color:'+c+';font-weight:700;font-size:14px;margin-bottom:8px">💡 '+sm.gt+'</div>'+
        sm.gi.map(function(x){return'<div style="color:#aaa;font-size:14px;line-height:1.8">✓ '+x+'</div>';}).join("")+
        '<div class="ex-box"><span style="color:#666;font-size:13px">프롬프트 예시:<br></span>'+ex+'</div></div>'+
      inp+'</div>'+
    '<div style="margin-bottom:14px"><div style="color:'+c+';font-weight:700;font-size:14px;margin-bottom:6px">📋 현재까지 만든 프롬프트:</div>'+
      '<div class="prompt-box">'+(pr||'<span style="color:#444">아직 입력 내용이 없어요</span>')+'</div></div>'+
    hint+
    '<button class="btn" style="background:'+(dis?"#2a2d3a":c)+';color:'+(dis?"#555":"#fff")+'" '+(dis?"disabled":"")+' onclick="doAI()">'+
      (st.loading?"⏳ AI가 생각하는 중...":"🤖 AI 결과 확인하기")+'</button>'+
    ((st.aiResult||st.loading)?aiBox(c):"")+
    (st.called&&!st.loading?evalHTML(g,st.step,c):"")+nxt;

  app.innerHTML=
    '<div class="topbar">'+
      '<button style="background:#22253a;border:none;color:#aaa;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:14px" onclick="st.screen=\'topic\';draw()">← 처음으로</button>'+
      '<span style="color:#666;font-size:14px;flex:1;margin-left:8px">'+(ti?ti.label:"")+'</span>'+
      '<span style="background:'+c+'22;border:1px solid '+c+';color:'+c+';border-radius:20px;padding:3px 12px;font-size:13px;font-weight:700">'+sm.badge+'</span></div>'+
    '<div style="background:#16181f;padding:10px 18px 12px;border-bottom:1px solid #2a2d3a">'+
      '<div style="display:flex;justify-content:space-between;font-size:12px;color:#555;margin-bottom:6px">'+
        STEPS.map(function(s){return'<span style="color:'+(st.step>=s.num?c:"#444")+';font-weight:'+(st.step===s.num?700:400)+'">'+s.num+'단계</span>';}).join("")+'</div>'+
      '<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#1a6b2a,'+c+')"></div></div></div>'+
    '<div class="wrap">'+main+'</div>';
}

function pick(id){Object.assign(st,{screen:"game",topic:id,step:1,subject:"",role:"",target:"",condition:"",format:"",ethicsChecked:[],aiResult:"",loading:false,called:false,showHint:false,done:false,selFmt:null,customFmt:""});draw();}
function onInp(v){if(st.step===1)st.subject=v;else if(st.step===2)st.role=v;else if(st.step===3)st.target=v;else if(st.step===4)st.condition=v;var p=document.querySelector(".prompt-box");if(p){var pr=getPrompt();p.innerHTML=pr||'<span style="color:#444">아직 입력 내용이 없어요</span>';}var fi=document.getElementById("fi");if(fi){var pos=fi.selectionStart;setTimeout(function(){try{fi.setSelectionRange(pos,pos);}catch(e){}},0);}}
function setRole(r){st.role=r;draw();}
function selFmt(v){st.selFmt=v;if(v!=="__custom__"){st.format=v;st.customFmt="";}else{st.format="";}draw();}
function onCust(v){st.customFmt=v;st.format=v;var p=document.querySelector(".prompt-box");if(p){var pr=getPrompt();p.innerHTML=pr||'<span style="color:#444">아직 입력 내용이 없어요</span>';}}
function togE(k){var i=st.ethicsChecked.indexOf(k);if(i>=0)st.ethicsChecked.splice(i,1);else st.ethicsChecked.push(k);draw();}
function next(){if(st.step<6){Object.assign(st,{step:st.step+1,aiResult:"",called:false,showHint:false,selFmt:null,customFmt:""});}else st.done=true;draw();}
draw();
</script>
</body>
</html>
